<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手指拖拽调整 iframe 大小（限宽不限高）+ 自动分页</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    padding: 10px; 
    overscroll-behavior: none;
    max-width: 1200px;
    margin: 0 auto;
    transform: scale(0.95);
    transform-origin: top center;
    width: 100%;
  }

  .iframeContainer {
    position: relative;
    width: 100%;
    max-width: 700px;
    height: 400px;
    border: 1px solid #ccc;
    overflow: hidden;
    touch-action: none;
    margin: 0 auto 15px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .sizeDisplay {
    position: absolute;
    top: 5px;
    left: 5px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    padding: 2px 5px;
    font-size: 12px;
    border-radius: 3px;
    z-index: 10;
  }

  h2 {
    font-size: 18px;
    margin: 10px 0;
    text-align: center;
  }

  p {
    font-size: 14px;
    text-align: center;
  }

  .header-info {
    text-align: center;
    margin-bottom: 15px;
    font-size: 14px;
    color: #555;
  }

  /* 分页按钮 */
  .pagination {
    text-align: center;
    margin: 15px 0;
  }

  .pagination button {
    margin: 0 5px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    background: #4CAF50;
    border: none;
    color: white;
    border-radius: 5px;
    transition: all 0.2s ease;
  }

  .pagination button:hover {
    background: #45a049;
    transform: scale(1.05);
  }

  .pagination button:disabled {
    background: #888;
    cursor: default;
    transform: none;
  }
</style>
</head>
<body>

<div class="header-info">
  <h2>手指拖拽调整 iframe（限宽不限高） + 自动分页</h2>
  <p>拖拽 iframe 区域调整宽高，宽度受限制，高度自由，左上角显示实时宽高</p>
  <p>提示：使用 Ctrl++ 放大，Ctrl+- 缩小，Ctrl+0 恢复默认大小</p>
</div>

<!-- 分页按钮（上方） -->
<div class="pagination" id="paginationButtons"></div>

<!-- iframe 原始容器（隐藏，用于生成分页） -->
<div id="iframeContainerOriginal" style="display:none;">
  <div class="iframeContainer" style="height: 2888px;"><div class="sizeDisplay"></div><iframe src="2pppppppppppppp.php"></iframe></div>
  <div class="iframeContainer" style="height: 2888px;"><div class="sizeDisplay"></div><iframe src="444444pst444444.php"></iframe></div>
  <div class="iframeContainer" style="height: 2888px;"><div class="sizeDisplay"></div><iframe src="OFOOK555555555552026.php"></iframe></div>
  <div class="iframeContainer" style="height: 2888px;"><div class="sizeDisplay"></div><iframe src="2f2yuanf222222222222.php"></iframe></div>
  <div class="iframeContainer" style="height: 1288px;"><div class="sizeDisplay"></div><iframe src="666666pst666666.php"></iframe></div>
  <div class="iframeContainer" style="height: 2888px;"><div class="sizeDisplay"></div><iframe src="OFOOK555555555552026.php"></iframe></div>
  <div class="iframeContainer" style="height: 1288px;"><div class="sizeDisplay"></div><iframe src="555555pst555555.php"></iframe></div>
  <div class="iframeContainer" style="height: 2888px;"><div class="sizeDisplay"></div><iframe src="okokokokok88888888885.php"></iframe></div>
  <div class="iframeContainer" style="height: 2888px;"><div class="sizeDisplay"></div><iframe src="OFOOK555555555552026.php"></iframe></div>
</div>

<!-- 自动分页容器 -->
<div id="iframePagesContainer"></div>

<script>
const MIN_WIDTH = 100;
const MAX_WIDTH = 700;
const iframesOriginal = document.querySelectorAll('#iframeContainerOriginal .iframeContainer');
const pagesContainer = document.getElementById('iframePagesContainer');
const paginationContainer = document.getElementById('paginationButtons');

const PER_PAGE = 4; // 每页显示 4 个 iframe
let pages = [];
let currentPage = 0;

// 自动分页
for (let i = 0; i < iframesOriginal.length; i += PER_PAGE) {
    const pageDiv = document.createElement('div');
    pageDiv.className = 'page';
    pageDiv.style.display = 'none';
    for (let j = i; j < i + PER_PAGE && j < iframesOriginal.length; j++) {
        pageDiv.appendChild(iframesOriginal[j].cloneNode(true));
    }
    pagesContainer.appendChild(pageDiv);
    pages.push(pageDiv);
}

// 显示指定页
function showPage(index) {
    pages.forEach((p, i) => p.style.display = i === index ? 'block' : 'none');
    currentPage = index;
    renderPaginationButtons();
}

// 渲染分页按钮
function renderPaginationButtons() {
    paginationContainer.innerHTML = '';
    pages.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.textContent = i + 1;
        if (i === currentPage) btn.disabled = true;
        btn.addEventListener('click', () => showPage(i));
        paginationContainer.appendChild(btn);
    });
}

// 初始显示第一页
showPage(0);

// ===================
// 拖拽功能
// ===================
function addDrag(container) {
    const display = container.querySelector('.sizeDisplay');
    let startX, startY, startWidth, startHeight;

    function updateDisplay() {
        display.textContent = `${container.offsetWidth}px × ${container.offsetHeight}px`;
    }
    updateDisplay();

    container.addEventListener('touchstart', function(e) {
        e.stopPropagation(); e.preventDefault();
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        startWidth = container.offsetWidth;
        startHeight = container.offsetHeight;
    }, { passive: false });

    container.addEventListener('touchmove', function(e) {
        e.stopPropagation(); e.preventDefault();
        const touch = e.touches[0];
        let dx = touch.clientX - startX;
        let dy = touch.clientY - startY;

        let newWidth = startWidth + dx;
        if (newWidth < MIN_WIDTH) newWidth = MIN_WIDTH;
        if (newWidth > MAX_WIDTH) newWidth = MAX_WIDTH;

        let newHeight = startHeight + dy;

        container.style.width = newWidth + 'px';
        container.style.height = newHeight + 'px';
        updateDisplay();
    }, { passive: false });
}

// 给所有 iframeContainer 添加拖拽
document.querySelectorAll('.iframeContainer').forEach(addDrag);

// ===================
// 缩放快捷键
// ===================
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey) {
        if (e.key === '+') { e.preventDefault(); adjustScale(0.05); }
        else if (e.key === '-') { e.preventDefault(); adjustScale(-0.05); }
        else if (e.key === '0') { e.preventDefault(); document.body.style.transform = 'scale(1)'; document.body.style.transformOrigin = 'top center'; }
    }
});

function adjustScale(delta) {
    const currentScale = parseFloat(document.body.style.transform.replace('scale(', '').replace(')', '')) || 0.95;
    const newScale = Math.min(Math.max(0.5, currentScale + delta), 1.5);
    document.body.style.transform = `scale(${newScale})`;
    document.body.style.transformOrigin = 'top center';
}
</script>

</body>
</html>
